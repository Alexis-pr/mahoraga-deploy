<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahoraga Interview</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <link rel="stylesheet" href="../css/base/reset.css">
    <link rel="stylesheet" href="../css/features/theme.css">
    <link rel="stylesheet" href="../css/features/interview-chat.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <main class="interview-shell">
        <header class="interview-topbar">
            <button class="back-link" type="button" id="backToDashboard">
                <i class="bi bi-arrow-left"></i>
                <span>Salir</span>
            </button>

            <div class="interview-topic">
                <span class="interview-topic-icon" id="interviewTechnologyIcon">PY</span>
                <div>
                    <p class="interview-technology" id="interviewTechnology">Technology</p>
                    <p class="interview-module" id="interviewModule">Module</p>
                </div>
            </div>

            <div class="interview-user">
                <div class="interview-user-avatar" id="interviewUserAvatar">
                    <i class="bi bi-person"></i>
                </div>
                <div class="interview-user-copy">
                    <p id="interviewUsername">User</p>
                    <span id="interviewUserMeta">Level • Language</span>
                </div>
            </div>

            <label class="interview-language-picker" for="interviewLanguageSelect">
                <span>Language</span>
                <select id="interviewLanguageSelect"></select>
            </label>

            <div class="interview-counter" id="interviewCounter">0/0</div>
        </header>

        <div class="interview-progress">
            <div class="interview-progress-bar" id="interviewProgressBar"></div>
        </div>

        <section class="interview-grid">
            <div class="grid-overlay"></div>

            <article class="question-card">
                <div class="question-meta">
                    <span class="question-level" id="questionLevel">beginner</span>
                    <span class="question-points" id="questionPoints">10 pts</span>
                </div>
                <h1 class="question-text" id="questionText">Loading interview...</h1>
            </article>

            <section class="response-panel">
                <div class="voice-hint">
                    <button class="voice-button" type="button" disabled aria-label="Voice recording disabled for now">
                        <i class="bi bi-mic"></i>
                    </button>
                    <p>Click para grabar tu respuesta</p>
                </div>

                <label class="answer-label" for="answerInput">// o escribe tu respuesta</label>
                <textarea
                    id="answerInput"
                    class="answer-input"
                    placeholder="Escribe tu respuesta aqui..."
                ></textarea>

                <div class="response-actions">
                    <button class="submit-answer" id="submitAnswer" type="button">
                        <i class="bi bi-send"></i>
                        <span>Enviar respuesta</span>
                    </button>
                    <button class="next-question" id="nextQuestion" type="button" hidden>
                        <span>Siguiente pregunta</span>
                        <i class="bi bi-arrow-right"></i>
                    </button>
                </div>
            </section>

            <aside class="feedback-card" id="feedbackCard">
                <div class="feedback-header">
                    <h2>Feedback</h2>
                    <span class="feedback-badge" id="feedbackBadge">Pending</span>
                </div>
                <p class="feedback-score">Puntaje: <strong id="feedbackScore">0</strong></p>
                <p class="feedback-level">Nivel estimado: <strong id="feedbackLevel">Sin evaluar</strong></p>
                <p class="feedback-text" id="feedbackText">Responde la primera pregunta para obtener retroalimentacion.</p>
            </aside>
        </section>
    </main>

    <script type="module" src="../js/interviewPage.js"></script>
</body>
</html>
